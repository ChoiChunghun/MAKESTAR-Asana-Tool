<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Page Sync</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: var(--figma-color-bg, #ffffff);
        --text: var(--figma-color-text, #1f2328);
        --muted: var(--figma-color-text-secondary, #656d76);
        --border: var(--figma-color-border, #d0d7de);
        --accent: var(--figma-color-bg-brand, #0969da);
        --accent-text: var(--figma-color-text-onbrand, #ffffff);
        --danger: var(--figma-color-text-danger, #b42318);
        --warn: #8a5a00;
        --ok: #1f7a45;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-size: 12px;
      }

      main {
        padding: 14px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      h2 {
        margin: 18px 0 8px;
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
      }

      label {
        display: block;
        margin: 8px 0 4px;
        color: var(--muted);
      }

      input {
        width: 100%;
        min-height: 32px;
        padding: 7px 8px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: transparent;
        color: var(--text);
        font: inherit;
      }

      button {
        min-height: 32px;
        padding: 7px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: transparent;
        color: var(--text);
        font: inherit;
        cursor: pointer;
      }

      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--accent-text);
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px;
        margin-bottom: 10px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 96px;
        gap: 8px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .status-line {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        line-height: 1.55;
      }

      .muted {
        color: var(--muted);
      }

      .result {
        white-space: pre-wrap;
        line-height: 1.5;
      }

      .ok {
        color: var(--ok);
      }

      .warn {
        color: var(--warn);
      }

      .error {
        color: var(--danger);
      }

      .log {
        height: 150px;
        overflow: auto;
        white-space: pre-wrap;
        line-height: 1.45;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PDF Page Sync</h1>

      <section class="panel" aria-label="Boot status">
        <div class="status-line"><span>plugin boot status</span><strong id="bootStatus">waiting</strong></div>
        <div class="status-line"><span>current selection count</span><strong id="selectionCount">0</strong></div>
        <div class="status-line"><span>selection read</span><strong id="selectionRead">waiting</strong></div>
        <div class="status-line"><span>current sourcePdfId</span><strong id="currentSource">test-doc</strong></div>
      </section>

      <h2>Connect</h2>
      <section class="panel">
        <div class="grid">
          <div>
            <label for="sourcePdfId">sourcePdfId</label>
            <input id="sourcePdfId" value="test-doc" />
          </div>
          <div>
            <label for="pageNumber">pageNumber</label>
            <input id="pageNumber" type="number" min="1" value="1" />
          </div>
        </div>
        <div class="actions">
          <button id="connectButton" class="primary">Connect</button>
        </div>
      </section>

      <h2>Inspect</h2>
      <section class="panel">
        <div class="actions">
          <button id="readMappingButton">Read current mapping</button>
        </div>
        <div id="mappingResult" class="result muted">No mapping read yet.</div>
      </section>

      <h2>Test Sync</h2>
      <section class="panel">
        <div class="actions">
          <button id="testSyncButton" class="primary">Test Sync with sample image</button>
        </div>
        <div class="muted">Uses http://localhost:9910/sample-assets/test-image.png only when clicked.</div>
      </section>

      <h2>Real Sync</h2>
      <section class="panel">
        <label for="manifestInput">Manifest URL or base URL</label>
        <input id="manifestInput" value="http://localhost:9910/sample-assets" />
        <div class="actions">
          <button id="realSyncButton" class="primary">Real Sync</button>
        </div>
      </section>

      <h2>Result</h2>
      <section class="panel">
        <div id="operationResult" class="result muted">No operation yet.</div>
      </section>

      <h2>Log</h2>
      <section class="panel">
        <div id="log" class="log"></div>
      </section>
    </main>

    <!-- UI_SCRIPT -->
  </body>
</html>
